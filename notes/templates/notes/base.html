<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}NotePilot{% endblock %}</title>

<style>

:root{
    --primary:#2563eb;
    --bg:#f8fafc;
    --text:#0f172a;
    --muted:#64748b;
    --border:#e2e8f0;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
}

.container{
    max-width:1100px;
    margin:auto;
    padding:32px 20px;
}

.navbar{
    background:white;
    border-bottom:1px solid var(--border);
}

.navbar-inner{
    max-width:1100px;
    margin:auto;
    padding:16px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-weight:700;
    font-size:20px;
    text-decoration:none;
    color:var(--primary);
}

.nav-actions a{
    text-decoration:none;
    margin-left:12px;
}

.card{
    background:white;
    border-radius:18px;
    border:1px solid var(--border);
    padding:24px;
}

.page-title{
    font-size:32px;
    margin-bottom:10px;
}

.page-subtitle{
    color:var(--muted);
}

.btn{
    padding:10px 16px;
    border-radius:10px;
    text-decoration:none;
    font-weight:600;
    font-size:14px;
    border:none;
    cursor:pointer;
}

.btn-primary{
    background:var(--primary);
    color:white;
}

.btn-dark{
    background:#0f172a;
    color:white;
}

.btn-light{
    background:#f1f5f9;
    color:#0f172a;
}

input,textarea{
    width:100%;
    padding:10px 12px;
    border-radius:8px;
    border:1px solid var(--border);
    font-size:14px;
}

textarea{
    min-height:120px;
}

.tag{
    display:inline-block;
    background:#eff6ff;
    color:#1d4ed8;
    padding:4px 10px;
    border-radius:999px;
    font-size:12px;
    margin-bottom:6px;
}

.muted{
    color:var(--muted);
}

.alert{
    padding:12px 16px;
    border-radius:10px;
    margin-bottom:18px;
}

.alert-success{
    background:#dcfce7;
    color:#166534;
}

.alert-error{
    background:#fee2e2;
    color:#991b1b;
}

</style>

{% block extra_css %}{% endblock %}

</head>

<body>

<header class="navbar">
    <div class="navbar-inner">
        <a href="{% url 'home' %}" class="logo">NotePilot</a>

        <div class="nav-actions">
            <a href="{% url 'home' %}" class="btn btn-light">Ana Sayfa</a>
            <a href="{% url 'note-create' %}" class="btn btn-primary">Yeni Not</a>
        </div>
    </div>
</header>

<div class="container">

{% if messages %}
    {% for message in messages %}
        <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-error{% endif %}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

{% block content %}{% endblock %}

</div>

</body>
</html>
